<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arbiter TUI Visual Viewer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@xterm/xterm@6.0.0/css/xterm.css"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #1d2021;
        height: 100%;
        color: #ebdbb2;
        font-family: Menlo, Monaco, Consolas, monospace;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      #toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid #3c3836;
        background: #282828;
      }
      #toolbar label {
        font-size: 13px;
      }
      #toolbar input {
        color: inherit;
      }
      #status {
        color: #a89984;
        font-size: 12px;
      }
      #terminal {
        width: 100%;
        flex: 1;
        padding: 16px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <label>
        Load snapshot
        <input id="snapshot-file" type="file" accept=".ansi,text/plain" />
      </label>
      <span id="status">Choose a captured <code>.ansi</code> snapshot to render.</span>
    </div>
    <div id="terminal"></div>
    <script src="https://unpkg.com/@xterm/xterm@6.0.0/lib/xterm.js"></script>
    <script>
      const status = document.getElementById("status");
      const input = document.getElementById("snapshot-file");
      const term = new Terminal({
        cols: 120,
        rows: 40,
        convertEol: false,
        fontFamily: "Menlo, Monaco, Consolas, monospace",
        fontSize: 14,
        lineHeight: 1.15,
        cursorBlink: false,
        disableStdin: true,
        allowTransparency: false,
        theme: {
          background: "#1d2021",
          foreground: "#ebdbb2"
        }
      });
      term.open(document.getElementById("terminal"));

      window.renderSnapshot = async (ansiData) => {
        term.reset();
        term.write(ansiData);
        await new Promise((resolve) => setTimeout(resolve, 120));
      };

      input.addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        if (!file) {
          status.textContent = "Choose a captured .ansi snapshot to render.";
          return;
        }
        status.textContent = `Rendering ${file.name}...`;
        try {
          const ansiData = await file.text();
          await window.renderSnapshot(ansiData);
          status.textContent = `Rendered ${file.name}`;
        } catch (error) {
          status.textContent = `Failed to render ${file.name}: ${error instanceof Error ? error.message : String(error)}`;
        }
      });
    </script>
  </body>
</html>
